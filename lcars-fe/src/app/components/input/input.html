@if (label) {
  <label class="tron-input-label">{{ label }}</label>
}

<div class="input-container" [class.focused]="isFocused() ? true : false">
  <input 
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInputChange($event)"
    (focus)="setFocus(true)"
    (blur)="setFocus(false)"
    class="tron-styled-input"
  />
  <div class="input-scanline"></div>
</div>
