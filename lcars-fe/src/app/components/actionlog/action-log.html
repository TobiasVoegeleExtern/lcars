<app-card class="lcars-terminal-card">
  <div class="terminal-header">
    <div class="lcars-elbow"></div>
    <div class="controls">
      <app-textfield 
        placeholder="Search Terminal..." 
        (input)="/* filter logic */">
      </app-textfield>
     <app-date-picker 
  label="Filter by Date" 
  [(value)]="filterDate"> 
</app-date-picker>
    </div>
  </div>

  <div class="terminal-body">
    @for (log of terminalOutput(); track log.id) {
      <div class="log-entry" [style.border-left-color]="getStatusColor(log.type)">
        <span class="timestamp">[{{ log.timestamp | date:'HH:mm:ss' }}]</span>
        <span class="status-tag">{{ log.type === 'error' ? '!!!' : '>>>' }}</span>
        <span class="message">{{ log.message }}</span>
        
        <!-- Ternary logic for extra details -->
        <small *ngIf="log.details" class="details">
          {{ log.details ? '(' + log.details + ')' : '' }}
        </small>
      </div>
    } @empty {
      <div class="empty-state">NO ACTIVE DATA STREAMS FOUND</div>
    }
  </div>
</app-card>
