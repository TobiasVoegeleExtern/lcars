<div class="frame-container">
  <header class="frame-header">
    <div class="header-content">
      <h1 class="app-title">
        <img [src]="themeService.isDarkTheme() ? 'tron-logo-dark.png' : 'tron-logo-light.png'" 
             alt="Cody Tron (Trace 0n)" 
             class="header-logo">
      </h1>
      
      <div class="header-actions">
        <div class="header-controls">
          
          @if (authStore.isLoggedIn()) {
            <div class="user-section" (click)="authStore.logout()" title="Logout">
              <span class="user-label">USER:</span>
              <strong class="user-name">{{ authStore.username() }}</strong>
            </div>

            <div class="tron-divider"></div>
          }

          <div class="bit-container" (click)="themeService.toggleTheme()">
            <div class="bit-3d-scene" [class.is-no]="themeService.isDarkTheme()">
              <div class="bit-shape">
                <div class="face"></div><div class="face"></div>
                <div class="face"></div><div class="face"></div>
                <div class="face"></div><div class="face"></div>
                <div class="face"></div><div class="face"></div>
              </div>
            </div>
          </div>
        </div>
        
        <button class="menu-toggle" (click)="toggleMenu()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="frame-main-area">
    <nav class="frame-sidebar" [class.open]="isMenuOpen">

      <div class="service-selector">
        <app-dropdown
          [items]="microserviceState.availableServices()" 
          [selectedItem]="selectedService()"
          (itemSelect)="selectService($event)">
        </app-dropdown>
      </div>

      <ul>
        <li>
          <a [routerLink]="['/dashboard', microserviceState.selectedServiceId()]" routerLinkActive="active-link" (click)="closeMenus()">Dashboard</a>
        </li>
        <li>
          <a [routerLink]="['/settings', microserviceState.selectedServiceId()]" routerLinkActive="active-link" (click)="closeMenus()">Einstellungen</a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-overlay" [class.active]="isMenuOpen" (click)="toggleMenu()"></div>

    <main class="frame-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <footer class="frame-footer">
  </footer>
</div>
