<div class="lcars-frame-container" [class.dark-theme]="themeService.isDarkTheme()">
  
  <!-- TOP BAR & HEADER -->
  <header class="lcars-header">
    <div class="lcars-elbow-top-left"></div>
    <div class="lcars-top-bar">
      <div class="system-title">LCARS // TRON_OS // 32.CENTURY</div>
      
      <div class="header-controls">
        <!-- 32nd Century Toggle (Ternary integriert) -->
        <div class="lcars-32nd-toggle" 
             (click)="themeService.toggleTheme()"
             [class.active]="themeService.isDarkTheme()">
          <div class="matter-fragments">
            <div class="fragment f1"></div>
            <div class="fragment f2"></div>
            <div class="fragment f3"></div>
          </div>
          <span class="mode-label">
            {{ themeService.isDarkTheme() ? 'BLACKOUT_MODE' : 'ILLUMINATE_ON' }}
          </span>
        </div>
        
        <div class="tron-divider"></div>
        <div class="user-info">COMMANDER_SESSION_ACTIVE</div>
      </div>
    </div>
  </header>

  <div class="lcars-main-layout">
    <!-- SIDEBAR -->
    <nav class="lcars-sidebar">
      <div class="lcars-sidebar-content">
        <a routerLink="/dashboard" routerLinkActive="active" class="lcars-nav-item">DASHBOARD</a>
        <a routerLink="/media" routerLinkActive="active" class="lcars-nav-item item-blue">MEDIA_DB</a>
        <a routerLink="/logs" routerLinkActive="active" class="lcars-nav-item item-orange">ACTION_LOG</a>
        <div class="lcars-filler"></div> 
      </div>
    </nav>

    <!-- CONTENT AREA -->
    <main class="lcars-content">
      <div class="scroll-container">
     
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- FOOTER BAR -->
  <footer class="lcars-footer lcars-header">
    <div class="lcars-elbow-bottom-left" style="border-radius: 0 0 0 40px; height: 30px;"></div>
    <div class="lcars-bottom-bar lcars-top-bar" style="height: 20px; font-size: 0.7rem;">
      <span class="status-text">SYSTEM_READY // ENCRYPTION_ACTIVE</span>
    </div>
  </footer>
</div>
